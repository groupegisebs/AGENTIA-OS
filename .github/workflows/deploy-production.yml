name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-agentia-os
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEFAULT_SSH_HOST: "51.79.53.197"
  DEFAULT_SSH_USER: "ubuntu"
  DEFAULT_SSH_PORT: "22"
  DEFAULT_APP_ROOT: "/opt/apps/agentia-os"
  SERVICE_API: "agentia-os-api"
  SERVICE_WEB: "agentia-os-web"
  SERVICE_RUNTIME: "agentia-os-runtime"

jobs:
  build-and-deploy:
    name: Build and deploy
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AgenticFactory.slnx

      - name: Publish API
        run: |
          dotnet publish src/AgenticFactory.Api/AgenticFactory.Api.csproj \
            -c Release -o publish/api --no-restore

      - name: Publish Web
        run: |
          dotnet publish src/AgenticFactory.Web/AgenticFactory.Web.csproj \
            -c Release -o publish/web --no-restore

      - name: Publish Runtime
        run: |
          dotnet publish src/AgenticFactory.Runtime.WindowsService/AgenticFactory.Runtime.WindowsService.csproj \
            -c Release -o publish/runtime --no-restore

      - name: Diagnose secrets
        run: |
          echo "Dépôt : ${{ github.repository }}"
          echo "Secrets SSH :"
          echo "  SSH_PRIVATE_KEY_UBUNTU1      → ${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 != '' && 'OK' || 'manquant' }}"
          echo "  AGENTIA_OS_SSH_PRIVATE_KEY   → ${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY != '' && 'OK' || 'manquant' }}"
          echo "Secrets app :"
          echo "  AGENTIA_OS_CONNECTION_STRING → ${{ secrets.AGENTIA_OS_CONNECTION_STRING != '' && 'OK' || 'manquant' }}"
          echo "  AGENTIA_OS_JWT_SECRET        → ${{ secrets.AGENTIA_OS_JWT_SECRET != '' && 'OK' || 'manquant' }}"

      - name: Resolve configuration
        run: |
          pick() { for v in "$@"; do [ -n "$v" ] && { printf '%s' "$v"; return; }; done; }

          SSH_KEY=$(pick \
            "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          SSH_HOST=$(pick \
            "${{ vars.SSH_HOST_UBUNTU1 }}" \
            "${{ secrets.SSH_HOST_UBUNTU1 }}" \
            "$DEFAULT_SSH_HOST")
          SSH_USER=$(pick \
            "${{ vars.SSH_USER_UBUNTU1 }}" \
            "${{ secrets.SSH_USER_UBUNTU1 }}" \
            "$DEFAULT_SSH_USER")
          SSH_PORT=$(pick \
            "${{ vars.SSH_PORT_UBUNTU1 }}" \
            "${{ secrets.SSH_PORT_UBUNTU1 }}" \
            "$DEFAULT_SSH_PORT")
          APP_ROOT=$(pick \
            "${{ vars.AGENTIA_OS_APP_ROOT }}" \
            "${{ secrets.AGENTIA_OS_APP_ROOT }}" \
            "$DEFAULT_APP_ROOT")
          CONN_STR=$(pick \
            "${{ secrets.AGENTIA_OS_CONNECTION_STRING }}" \
            "${{ secrets.AGENTIA_OS_DATABASE_URL }}")
          JWT_SECRET="${{ secrets.AGENTIA_OS_JWT_SECRET }}"
          AI_MODE=$(pick "${{ vars.AGENTIA_OS_AI_MODE }}" "mock")
          OPENAI_KEY="${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}"
          AZURE_ENDPOINT="${{ secrets.AGENTIA_OS_AZURE_OPENAI_ENDPOINT }}"
          AZURE_KEY="${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}"
          AZURE_DEPLOY="${{ secrets.AGENTIA_OS_AZURE_OPENAI_DEPLOYMENT }}"

          missing=0
          [ -z "$SSH_KEY"    ] && echo "::error::Clé SSH manquante (SSH_PRIVATE_KEY_UBUNTU1 ou AGENTIA_OS_SSH_PRIVATE_KEY)" && missing=1
          [ -z "$CONN_STR"   ] && echo "::error::Connection string manquante (AGENTIA_OS_CONNECTION_STRING)" && missing=1
          [ -z "$JWT_SECRET" ] && echo "::error::JWT secret manquant (AGENTIA_OS_JWT_SECRET)" && missing=1
          [ "$missing" -eq 0 ] || exit 1

          echo "SSH_KEY<<ENVSSH"      >> "$GITHUB_ENV"
          echo "$SSH_KEY"            >> "$GITHUB_ENV"
          echo "ENVSSH"              >> "$GITHUB_ENV"

          {
            echo "SSH_HOST=$SSH_HOST"
            echo "SSH_USER=$SSH_USER"
            echo "SSH_PORT=$SSH_PORT"
            echo "APP_ROOT=$APP_ROOT"
            echo "CONN_STR=$CONN_STR"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "AI_MODE=$AI_MODE"
            echo "OPENAI_KEY=$OPENAI_KEY"
            echo "AZURE_ENDPOINT=$AZURE_ENDPOINT"
            echo "AZURE_KEY=$AZURE_KEY"
            echo "AZURE_DEPLOY=$AZURE_DEPLOY"
          } >> "$GITHUB_ENV"

          echo "Config → ${SSH_USER}@${SSH_HOST}:${SSH_PORT} root=${APP_ROOT}"

      - name: Setup SSH key
        id: ssh
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null || {
            echo "::error::Clé SSH invalide"
            exit 1
          }
          echo "KEY_PATH=$HOME/.ssh/deploy_key" >> "$GITHUB_ENV"

      - name: Add server to known_hosts
        run: ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Write app env on server
        run: |
          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" bash -s <<'ENVSSH'
          mkdir -p /opt/apps/agentia-os
          ENVSSH

          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.api" <<ENVFILE
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://+:8080
          ConnectionStrings__Default=${CONN_STR}
          Database__Provider=postgres
          Auth__JwtKey=${JWT_SECRET}
          Auth__Issuer=AgenticFactory
          Auth__Audience=AgenticFactoryClients
          AI__Mode=${AI_MODE}
          AI__Provider=${AI_MODE}
          AI__OpenAI__ApiKey=${OPENAI_KEY}
          AI__AzureOpenAI__Endpoint=${AZURE_ENDPOINT}
          AI__AzureOpenAI__ApiKey=${AZURE_KEY}
          AI__AzureOpenAI__Deployment=${AZURE_DEPLOY}
          ENVFILE

          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.web" <<ENVWEB
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://+:8081
          ApiBaseUrl=http://localhost:8080
          Auth__JwtKey=${JWT_SECRET}
          Auth__Issuer=AgenticFactory
          Auth__Audience=AgenticFactoryClients
          ENVWEB

          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.runtime" <<ENVRT
          ConnectionStrings__Default=${CONN_STR}
          Database__Provider=postgres
          AI__Mode=${AI_MODE}
          AI__OpenAI__ApiKey=${OPENAI_KEY}
          AI__AzureOpenAI__Endpoint=${AZURE_ENDPOINT}
          AI__AzureOpenAI__ApiKey=${AZURE_KEY}
          AI__AzureOpenAI__Deployment=${AZURE_DEPLOY}
          ENVRT

      - name: Sync API bundle
        run: |
          rsync -az --delete \
            -e "ssh -i $KEY_PATH -p $SSH_PORT -o BatchMode=yes" \
            publish/api/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/api/"

      - name: Sync Web bundle
        run: |
          rsync -az --delete \
            -e "ssh -i $KEY_PATH -p $SSH_PORT -o BatchMode=yes" \
            publish/web/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/web/"

      - name: Sync Runtime bundle
        run: |
          rsync -az --delete \
            -e "ssh -i $KEY_PATH -p $SSH_PORT -o BatchMode=yes" \
            publish/runtime/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/runtime/"

      - name: Run EF migrations
        run: |
          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cd ${APP_ROOT}/api && \
             set -a && source ${APP_ROOT}/.env.api && set +a && \
             dotnet AgenticFactory.Api.dll --migrate-only 2>/dev/null || true"

      - name: Restart services
        run: |
          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl restart ${{ env.SERVICE_API }} ${{ env.SERVICE_WEB }} ${{ env.SERVICE_RUNTIME }}"

      - name: Health check
        run: |
          sleep 10
          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "curl -fsS http://localhost:8080/health && echo 'API OK'"

      - name: Service status
        if: always() && steps.ssh.outcome == 'success'
        run: |
          ssh -i "$KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl status ${{ env.SERVICE_API }} ${{ env.SERVICE_WEB }} ${{ env.SERVICE_RUNTIME }} --no-pager || true"

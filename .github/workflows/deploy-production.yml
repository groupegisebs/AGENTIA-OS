name: Deploy Production

# ─────────────────────────────────────────────────────────────────────────────
# Déclencheurs
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-agentia-os
  cancel-in-progress: true

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Valeurs par défaut (overridables via Variables GitHub)
# ─────────────────────────────────────────────────────────────────────────────
env:
  SSH_HOST_DEFAULT:    "51.79.53.197"
  SSH_USER_DEFAULT:    "ubuntu"
  SSH_PORT_DEFAULT:    "22"
  APP_ROOT_DEFAULT:    "/opt/apps/agentia-os"
  SERVICE_API:         "agentia-os-api"
  SERVICE_WEB:         "agentia-os-web"
  SERVICE_RUNTIME:     "agentia-os-runtime"
  DOTNET_VERSION:      "10.0.x"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 1 — Validation des secrets et variables
# ═════════════════════════════════════════════════════════════════════════════
jobs:

  stage1-validate:
    name: "Stage 1 — Validation secrets & variables"
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    outputs:
      ssh_host: ${{ steps.config.outputs.ssh_host }}
      ssh_user: ${{ steps.config.outputs.ssh_user }}
      ssh_port: ${{ steps.config.outputs.ssh_port }}
      app_root: ${{ steps.config.outputs.app_root }}

    steps:
      - name: "1.1 Vérification secrets obligatoires"
        run: |
          missing=0
          check() {
            local name="$1" val="$2"
            if [ -z "$val" ]; then
              echo "::error::Secret manquant : $name — voir deploy/GITHUB-SECRETS.md"
              missing=1
            else
              echo "  ✓ $name"
            fi
          }

          echo "── Secrets SSH (un seul suffit) ──"
          SSH_FOUND=0
          [ -n "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}" ]    && SSH_FOUND=1 && echo "  ✓ SSH_PRIVATE_KEY_UBUNTU1"
          [ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] && SSH_FOUND=1 && echo "  ✓ AGENTIA_OS_SSH_PRIVATE_KEY"
          [ "$SSH_FOUND" -eq 0 ] && echo "::error::Clé SSH manquante" && missing=1

          echo "── Secrets applicatifs ──"
          check "AGENTIA_OS_CONNECTION_STRING" "${{ secrets.AGENTIA_OS_CONNECTION_STRING }}"
          check "AGENTIA_OS_JWT_SECRET"        "${{ secrets.AGENTIA_OS_JWT_SECRET }}"

          echo "── Provider IA (optionnel — mode mock si absent) ──"
          [ -n "${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}" ]           && echo "  ✓ OPENAI configuré"
          [ -n "${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}" ]     && echo "  ✓ Azure OpenAI configuré"
          [ -z "${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}" ] && \
          [ -z "${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}" ]     && echo "  ℹ Mode mock actif (aucun provider IA)"

          [ "$missing" -eq 0 ] || exit 1
          echo "Validation OK"

      - name: "1.2 Résolution de la configuration serveur"
        id: config
        run: |
          pick() { for v in "$@"; do [ -n "$v" ] && { printf '%s' "$v"; return; }; done; }

          SSH_HOST=$(pick "${{ vars.SSH_HOST_UBUNTU1 }}"    "${{ secrets.SSH_HOST_UBUNTU1 }}"    "$SSH_HOST_DEFAULT")
          SSH_USER=$(pick "${{ vars.SSH_USER_UBUNTU1 }}"    "${{ secrets.SSH_USER_UBUNTU1 }}"    "$SSH_USER_DEFAULT")
          SSH_PORT=$(pick "${{ vars.SSH_PORT_UBUNTU1 }}"    "${{ secrets.SSH_PORT_UBUNTU1 }}"    "$SSH_PORT_DEFAULT")
          APP_ROOT=$(pick "${{ vars.AGENTIA_OS_APP_ROOT }}" "${{ secrets.AGENTIA_OS_APP_ROOT }}" "$APP_ROOT_DEFAULT")

          echo "Cible → ${SSH_USER}@${SSH_HOST}:${SSH_PORT}  root=${APP_ROOT}"
          echo "ssh_host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "ssh_user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          echo "app_root=$APP_ROOT" >> "$GITHUB_OUTPUT"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 2 — Build & Publication .NET
# ═════════════════════════════════════════════════════════════════════════════

  stage2-build:
    name: "Stage 2 — Build & Publish .NET"
    needs: [stage1-validate]
    runs-on: ubuntu-latest

    steps:
      - name: "2.1 Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: "2.2 Setup .NET ${{ env.DOTNET_VERSION }}"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "2.3 Restore"
        run: dotnet restore AgenticFactory.slnx

      - name: "2.4 Build Release"
        run: dotnet build AgenticFactory.slnx --no-restore -c Release

      - name: "2.5 Publish API"
        run: |
          dotnet publish src/AgenticFactory.Api/AgenticFactory.Api.csproj \
            -c Release -o publish/api --no-restore

      - name: "2.6 Publish Web (frontend admin)"
        run: |
          dotnet publish src/AgenticFactory.Web/AgenticFactory.Web.csproj \
            -c Release -o publish/web --no-restore

      - name: "2.7 Publish Runtime (agent worker)"
        run: |
          dotnet publish src/AgenticFactory.Runtime.WindowsService/AgenticFactory.Runtime.WindowsService.csproj \
            -c Release -o publish/runtime --no-restore

      - name: "2.8 Upload artifacts API"
        uses: actions/upload-artifact@v4
        with:
          name: artifact-api
          path: publish/api/
          retention-days: 1

      - name: "2.9 Upload artifacts Web"
        uses: actions/upload-artifact@v4
        with:
          name: artifact-web
          path: publish/web/
          retention-days: 1

      - name: "2.10 Upload artifacts Runtime"
        uses: actions/upload-artifact@v4
        with:
          name: artifact-runtime
          path: publish/runtime/
          retention-days: 1

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 3 — Déploiement Backend (API)
# ═════════════════════════════════════════════════════════════════════════════

  stage3-deploy-api:
    name: "Stage 3 — Deploy Backend API"
    needs: [stage1-validate, stage2-build]
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ needs.stage1-validate.outputs.ssh_host }}
      SSH_USER: ${{ needs.stage1-validate.outputs.ssh_user }}
      SSH_PORT: ${{ needs.stage1-validate.outputs.ssh_port }}
      APP_ROOT: ${{ needs.stage1-validate.outputs.app_root }}

    steps:
      - name: "3.1 Setup SSH"
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          KEY=$([ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] \
            && echo "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            || echo "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          printf '%s\n' "$KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: "3.2 Download artifact API"
        uses: actions/download-artifact@v4
        with:
          name: artifact-api
          path: publish/api/

      - name: "3.3 Écrire .env.api sur le serveur"
        run: |
          AI_MODE=$([ -n "${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}" ] && echo "openai" \
            || ([ -n "${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}" ] && echo "azure" || echo "mock"))
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ${APP_ROOT}/api ${APP_ROOT}/web ${APP_ROOT}/runtime"
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.api" <<ENV
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://+:8080
          ConnectionStrings__Default=${{ secrets.AGENTIA_OS_CONNECTION_STRING }}
          Database__Provider=postgres
          Auth__JwtKey=${{ secrets.AGENTIA_OS_JWT_SECRET }}
          Auth__Issuer=AgenticFactory
          Auth__Audience=AgenticFactoryClients
          AI__Mode=${AI_MODE}
          AI__Provider=${AI_MODE}
          AI__OpenAI__ApiKey=${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}
          AI__AzureOpenAI__Endpoint=${{ secrets.AGENTIA_OS_AZURE_OPENAI_ENDPOINT }}
          AI__AzureOpenAI__ApiKey=${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}
          AI__AzureOpenAI__Deployment=${{ secrets.AGENTIA_OS_AZURE_OPENAI_DEPLOYMENT }}
          ENV

      - name: "3.4 Déployer bundle API (rsync)"
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o BatchMode=yes" \
            publish/api/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/api/"

      - name: "3.5 Migrations EF Core"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" bash <<'MIGRATE'
            set -a; source /opt/apps/agentia-os/.env.api; set +a
            cd /opt/apps/agentia-os/api
            dotnet AgenticFactory.Api.dll --ef-migrate 2>/dev/null || \
              echo "Migration skipped (non-supporté en mode auto)"
          MIGRATE

      - name: "3.6 Redémarrer service API"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl restart $SERVICE_API"

      - name: "3.7 Health check API"
        run: |
          echo "Attente démarrage API (15s)..."
          sleep 15
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "curl -fsS http://localhost:8080/health && echo ' → API OK'"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 4 — Tests de smoke post-déploiement API
# ═════════════════════════════════════════════════════════════════════════════

  stage4-smoke-tests:
    name: "Stage 4 — Smoke Tests Backend"
    needs: [stage1-validate, stage3-deploy-api]
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ needs.stage1-validate.outputs.ssh_host }}
      SSH_USER: ${{ needs.stage1-validate.outputs.ssh_user }}
      SSH_PORT: ${{ needs.stage1-validate.outputs.ssh_port }}

    steps:
      - name: "4.1 Setup SSH"
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          KEY=$([ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] \
            && echo "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            || echo "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          printf '%s\n' "$KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: "4.2 Test — GET /health"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "curl -fsS http://localhost:8080/health"

      - name: "4.3 Test — POST /api/auth/register (smoke)"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "curl -fsS -X POST http://localhost:8080/api/auth/register \
               -H 'Content-Type: application/json' \
               -d '{\"email\":\"smoke@test.local\",\"password\":\"Smoke!2026\",\"fullName\":\"Smoke Test\",\"organizationName\":\"SmokeOrg\"}' \
               | grep -q 'token' && echo 'Register OK' || echo 'Already exists (OK)'"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 5 — Déploiement Frontend (Web Admin)
# ═════════════════════════════════════════════════════════════════════════════

  stage5-deploy-frontend:
    name: "Stage 5 — Deploy Frontend Web Admin"
    needs: [stage1-validate, stage4-smoke-tests]
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ needs.stage1-validate.outputs.ssh_host }}
      SSH_USER: ${{ needs.stage1-validate.outputs.ssh_user }}
      SSH_PORT: ${{ needs.stage1-validate.outputs.ssh_port }}
      APP_ROOT: ${{ needs.stage1-validate.outputs.app_root }}

    steps:
      - name: "5.1 Setup SSH"
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          KEY=$([ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] \
            && echo "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            || echo "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          printf '%s\n' "$KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: "5.2 Download artifact Web"
        uses: actions/download-artifact@v4
        with:
          name: artifact-web
          path: publish/web/

      - name: "5.3 Écrire .env.web sur le serveur"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.web" <<ENV
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://+:8081
          ApiBaseUrl=http://localhost:8080
          Auth__JwtKey=${{ secrets.AGENTIA_OS_JWT_SECRET }}
          Auth__Issuer=AgenticFactory
          Auth__Audience=AgenticFactoryClients
          ENV

      - name: "5.4 Déployer bundle Web (rsync)"
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o BatchMode=yes" \
            publish/web/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/web/"

      - name: "5.5 Redémarrer service Web"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl restart $SERVICE_WEB"

      - name: "5.6 Health check Web"
        run: |
          sleep 10
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8081/ | grep -qE '^(200|302)' && echo ' → Web OK'"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 6 — Déploiement Agent Runtime
# ═════════════════════════════════════════════════════════════════════════════

  stage6-deploy-runtime:
    name: "Stage 6 — Deploy Agent Runtime"
    needs: [stage1-validate, stage5-deploy-frontend]
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ needs.stage1-validate.outputs.ssh_host }}
      SSH_USER: ${{ needs.stage1-validate.outputs.ssh_user }}
      SSH_PORT: ${{ needs.stage1-validate.outputs.ssh_port }}
      APP_ROOT: ${{ needs.stage1-validate.outputs.app_root }}

    steps:
      - name: "6.1 Setup SSH"
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          KEY=$([ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] \
            && echo "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            || echo "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          printf '%s\n' "$KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: "6.2 Download artifact Runtime"
        uses: actions/download-artifact@v4
        with:
          name: artifact-runtime
          path: publish/runtime/

      - name: "6.3 Écrire .env.runtime sur le serveur"
        run: |
          AI_MODE=$([ -n "${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}" ] && echo "openai" \
            || ([ -n "${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}" ] && echo "azure" || echo "mock"))
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "cat > ${APP_ROOT}/.env.runtime" <<ENV
          ConnectionStrings__Default=${{ secrets.AGENTIA_OS_CONNECTION_STRING }}
          Database__Provider=postgres
          AI__Mode=${AI_MODE}
          AI__Provider=${AI_MODE}
          AI__OpenAI__ApiKey=${{ secrets.AGENTIA_OS_OPENAI_API_KEY }}
          AI__AzureOpenAI__Endpoint=${{ secrets.AGENTIA_OS_AZURE_OPENAI_ENDPOINT }}
          AI__AzureOpenAI__ApiKey=${{ secrets.AGENTIA_OS_AZURE_OPENAI_API_KEY }}
          AI__AzureOpenAI__Deployment=${{ secrets.AGENTIA_OS_AZURE_OPENAI_DEPLOYMENT }}
          ENV

      - name: "6.4 Déployer bundle Runtime (rsync)"
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p $SSH_PORT -o BatchMode=yes" \
            publish/runtime/ \
            "${SSH_USER}@${SSH_HOST}:${APP_ROOT}/runtime/"

      - name: "6.5 Redémarrer service Runtime"
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl restart $SERVICE_RUNTIME"

      - name: "6.6 Vérifier runtime actif"
        run: |
          sleep 5
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "systemctl is-active $SERVICE_RUNTIME && echo ' → Runtime OK' || echo '::warning::Runtime non actif'"

# ═════════════════════════════════════════════════════════════════════════════
# STAGE 7 — Rapport de déploiement
# ═════════════════════════════════════════════════════════════════════════════

  stage7-report:
    name: "Stage 7 — Rapport de déploiement"
    needs: [stage1-validate, stage6-deploy-runtime]
    if: always()
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ needs.stage1-validate.outputs.ssh_host }}
      SSH_USER: ${{ needs.stage1-validate.outputs.ssh_user }}
      SSH_PORT: ${{ needs.stage1-validate.outputs.ssh_port }}

    steps:
      - name: "7.1 Setup SSH"
        if: needs.stage1-validate.result == 'success'
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          KEY=$([ -n "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" ] \
            && echo "${{ secrets.AGENTIA_OS_SSH_PRIVATE_KEY }}" \
            || echo "${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}")
          printf '%s\n' "$KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: "7.2 Statut des services sur le serveur"
        if: needs.stage1-validate.result == 'success'
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "sudo systemctl status agentia-os-api agentia-os-web agentia-os-runtime --no-pager || true"

      - name: "7.3 Résumé pipeline"
        run: |
          echo "═══════════════════════════════════════"
          echo "  AGENTIC FACTORY — Rapport déploiement"
          echo "═══════════════════════════════════════"
          echo "  Stage 1 Validation  : ${{ needs.stage1-validate.result }}"
          echo "  Stage 2 Build       : ${{ needs.stage2-build.result }}"
          echo "  Stage 3 API         : ${{ needs.stage3-deploy-api.result }}"
          echo "  Stage 4 Smoke Tests : ${{ needs.stage4-smoke-tests.result }}"
          echo "  Stage 5 Web         : ${{ needs.stage5-deploy-frontend.result }}"
          echo "  Stage 6 Runtime     : ${{ needs.stage6-deploy-runtime.result }}"
          echo "───────────────────────────────────────"
          echo "  Serveur : $SSH_HOST"
          echo "  Commit  : ${{ github.sha }}"
          echo "═══════════════════════════════════════"

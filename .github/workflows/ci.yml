name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Check no secrets in repo
        run: bash deploy/check-no-secrets.sh

      - name: Ruff
        run: ruff check agent_creator tests

      - name: Import check
        run: python -c "from agent_creator.main import app; print('import ok', app.title)"

      - name: Pytest
        run: pytest tests -q

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentic_factory
      POSTGRES_USER: ${DB_USER:-agentia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentia} -d agentic_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: "Host=db;Port=5432;Database=agentic_factory;Username=${DB_USER:-agentia};Password=${DB_PASSWORD}"
      Database__Provider: postgres
      Auth__JwtKey: ${JWT_SECRET:?JWT_SECRET required}
      Auth__Issuer: AgenticFactory
      Auth__Audience: AgenticFactoryClients
      AI__Mode: ${AI_MODE:-mock}
      AI__Provider: ${AI_PROVIDER:-mock}
      AI__OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      AI__AzureOpenAI__Endpoint: ${AZURE_OPENAI_ENDPOINT:-}
      AI__AzureOpenAI__ApiKey: ${AZURE_OPENAI_API_KEY:-}
      AI__AzureOpenAI__Deployment: ${AZURE_OPENAI_DEPLOYMENT:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.Web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ApiBaseUrl: http://api:8080
      Auth__JwtKey: ${JWT_SECRET}
      Auth__Issuer: AgenticFactory
      Auth__Audience: AgenticFactoryClients
    depends_on:
      - api

volumes:
  pgdata:

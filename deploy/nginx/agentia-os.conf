################################################################################
# Agentic Factory — Configuration Nginx (reverse proxy)
# Web Admin : http://51.79.53.197  → :8081
# API        : http://51.79.53.197/api → :8080
################################################################################

# Upstream backend API
upstream agentia_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Upstream frontend Web Admin
upstream agentia_web {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;          # Accepte toutes les IPs — remplacer par ton domaine si tu en as un

    # Logs
    access_log /var/log/nginx/agentia-os-access.log;
    error_log  /var/log/nginx/agentia-os-error.log;

    # Taille max des requêtes (uploads blueprints, etc.)
    client_max_body_size 50M;

    # ── API (/api/* et /hubs/* pour SignalR) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://agentia_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Swagger ──────────────────────────────────────────────────────────────
    location /swagger {
        proxy_pass         http://agentia_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check API ─────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://agentia_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── SignalR WebSocket ─────────────────────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://agentia_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ── Web Admin (tout le reste) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://agentia_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Agentia OS — surcharge production
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#       up -d --scale worker=10
#
# Donne : 10 workers × 100 coroutines = 1 000 agents simultanés
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    command: >
      redis-server
        --bind 127.0.0.1
        --port 6379
        --appendonly yes
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
        --save 3600 1
        --save 300 100

  api:
    command: >
      uvicorn agent_creator.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level warning

  worker:
    command: ["python", "-m", "arq", "agent_creator.workers.agent_worker.WorkerSettings"]
